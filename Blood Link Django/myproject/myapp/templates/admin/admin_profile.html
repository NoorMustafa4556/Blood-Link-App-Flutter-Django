{% extends 'admin/admin_base.html' %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h1 style="font-size: 28px; font-weight: 700; color: #2b2d42;">Edit Profile Settings</h1>
        <a href="{% url 'admin_dashboard' %}" class="btn btn-white" style="border: 1px solid #ddd;"><i class="fa-solid fa-arrow-left"></i> Dashboard</a>
    </div>

    {% if messages %}
        {% for message in messages %}
            <div style="padding: 12px 20px; border-radius: 12px; background: #e8f5e9; color: #2e7d32; margin-bottom: 20px; font-weight: 600; display: flex; align-items: center; gap: 10px;">
                <i class="fa-solid fa-circle-check"></i> {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <div class="card" style="border-radius: 20px; box-shadow: var(--shadow); background: white; padding: 40px;">
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <!-- Avatar Section -->
            <div style="text-align: center; margin-bottom: 30px; position: relative;">
                <div style="width: 120px; height: 120px; border-radius: 50%; border: 4px solid #f0f0f0; overflow: hidden; margin: 0 auto 15px; background: #f8f9fa; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
                    {% if profile_obj.image %}
                        <img id="avatar-preview" src="{{ profile_obj.image.url }}" style="width: 100%; height: 100%; object-fit: cover;">
                    {% else %}
                        <div id="avatar-placeholder" style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #ef233c; color: white; font-size: 50px; font-weight: 800;">
                            {{ user_obj.username.0|upper }}
                        </div>
                    {% endif %}
                </div>
                <label for="image-upload" style="background: var(--primary); color: white; padding: 6px 15px; border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; box-shadow: 0 4px 10px rgba(239, 35, 60, 0.2); transition: all 0.2s;">
                    <i class="fa-solid fa-camera"></i> Change Photo
                </label>
                <input id="image-upload" type="file" name="image" accept="image/*" style="display: none;" onchange="previewImage(event)">
            </div>

            <!-- Profile Info Form Fields -->
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                <div>
                    <label style="display: block; font-size: 13px; font-weight: 700; color: #888; margin-bottom: 8px; text-transform: uppercase;">First Name</label>
                    <input type="text" name="first_name" value="{{ user_obj.first_name }}" class="btn" style="width: 100%; border: 1px solid #ddd; background: #fdfdfd; text-align: left; height: 48px; font-weight: 500; padding: 0 15px; border-radius: 10px;" required>
                </div>
                <div>
                    <label style="display: block; font-size: 13px; font-weight: 700; color: #888; margin-bottom: 8px; text-transform: uppercase;">Last Name</label>
                    <input type="text" name="last_name" value="{{ user_obj.last_name }}" class="btn" style="width: 100%; border: 1px solid #ddd; background: #fdfdfd; text-align: left; height: 48px; font-weight: 500; padding: 0 15px; border-radius: 10px;">
                </div>
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; font-size: 13px; font-weight: 700; color: #888; margin-bottom: 8px; text-transform: uppercase;">Email Address</label>
                <input type="email" name="email" value="{{ user_obj.email }}" class="btn" style="width: 100%; border: 1px solid #ddd; background: #fdfdfd; text-align: left; height: 48px; font-weight: 500; padding: 0 15px; border-radius: 10px;" required>
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; font-size: 13px; font-weight: 700; color: #888; margin-bottom: 8px; text-transform: uppercase;">Phone Number</label>
                <input type="text" name="phone_number" value="{{ profile_obj.phone_number|default:'' }}" placeholder="e.g. +923001234567" class="btn" style="width: 100%; border: 1px solid #ddd; background: #fdfdfd; text-align: left; height: 48px; font-weight: 500; padding: 0 15px; border-radius: 10px;">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 35px;">
                <div>
                    <label style="display: block; font-size: 13px; font-weight: 700; color: #888; margin-bottom: 8px; text-transform: uppercase;">City</label>
                    <select name="city" style="width: 100%; border: 1px solid #ddd; background: #fdfdfd; height: 48px; border-radius: 10px; padding: 0 12px; font-weight: 500; font-family: inherit; font-size: 14px; outline: none;">
                        <option value="">Select City</option>
                        {% for city in cities %}
                            <option value="{{ city.name }}" {% if profile_obj.city == city.name %}selected{% endif %}>{{ city.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label style="display: block; font-size: 13px; font-weight: 700; color: #888; margin-bottom: 8px; text-transform: uppercase;">Blood Group</label>
                    <select name="blood_group" style="width: 100%; border: 1px solid #ddd; background: #fdfdfd; height: 48px; border-radius: 10px; padding: 0 12px; font-weight: 500; font-family: inherit; font-size: 14px; outline: none;">
                        <option value="">Select Group</option>
                        {% for bg in blood_groups %}
                            <option value="{{ bg.name }}" {% if profile_obj.blood_group == bg.name %}selected{% endif %}>{{ bg.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; height: 50px; justify-content: center; font-size: 16px; font-weight: 700; border-radius: 12px; box-shadow: 0 4px 15px rgba(239, 35, 60, 0.25);">
                SAVE CHANGES
            </button>
        </form>
    </div>
</div>

<script>
function previewImage(event) {
    var reader = new FileReader();
    reader.onload = function(){
        var output = document.getElementById('avatar-preview');
        if (output) {
            output.src = reader.result;
        } else {
            // Replace text placeholder with img
            var container = document.getElementById('avatar-placeholder');
            container.outerHTML = '<img id="avatar-preview" src="' + reader.result + '" style="width: 100%; height: 100%; object-fit: cover;">';
        }
    };
    reader.readAsDataURL(event.target.files[0]);
}
</script>
{% endblock %}
