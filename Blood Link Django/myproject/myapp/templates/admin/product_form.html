{% extends 'admin/admin_base.html' %}

{% block content %}
<div style="display:flex; justify-content:center;">
    <div class="box-element" style="width:100%; max-width:600px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
            <h3 style="margin:0;">{{ title }}</h3>
            <a href="{% url 'admin_products' %}" class="btn-outline"
                style="text-decoration:none; display:flex; align-items:center; gap:5px;">
                <i class='bx bx-arrow-back'></i> Back
            </a>
        </div>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            {% for field in form %}
            <div class="form-field">
                <label>{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                <ul class="errorlist">
                    {% for error in field.errors %}
                    <li>{{ error }}</li>
                    {% endfor %}
                </ul>
                {% endif %}
            </div>
            {% endfor %}

            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <button type="submit" class="btn-primary" style="flex: 1;">Save Product</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
