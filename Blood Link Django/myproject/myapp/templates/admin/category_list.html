{% extends 'admin/admin_base.html' %}

{% block content %}
<div class="box-element">
    <div
        style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; flex-wrap: wrap; gap: 10px;">
        <h3 style="margin: 0;">Category Management</h3>
        <div style="display:flex; gap: 10px;">
            <a href="{% url 'admin_dashboard' %}" class="btn-outline"
                style="text-decoration:none; display:flex; align-items:center; gap:5px;">
                <i class='bx bx-arrow-back'></i> Back to Dashboard
            </a>
            <a href="{% url 'add_category' %}" class="btn-primary" style="text-decoration:none;">Add Category</a>
        </div>
    </div>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th style="width: 150px;">Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for category in categories %}
            <tr>
                <td>{{ category.id }}</td>
                <td>{{ category.name }}</td>
                <td>
                    <div style="display: flex; gap: 5px;">
                        <a href="{% url 'edit_category' category.id %}" class="btn-sm"
                            style="background:var(--primary-color); color:white; text-decoration:none;">Edit</a>
                        <a href="{% url 'delete_category' category.id %}" class="btn-sm"
                            style="background:var(--error-color); color:white; text-decoration:none;">Delete</a>
                    </div>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3">No categories found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
