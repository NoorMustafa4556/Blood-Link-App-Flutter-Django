{% extends 'admin/admin_base.html' %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h1 style="font-size: 28px;">Manage Blood Groups</h1>
        <a href="{% url 'admin_dashboard' %}" class="btn btn-white" style="border: 1px solid #ddd;"><i class="fa-solid fa-arrow-left"></i> Dashboard</a>
    </div>

    <div class="card" style="margin-bottom: 30px;">
        <h3 style="margin-bottom: 20px;">Add New Blood Group</h3>
        <form method="POST">
            {% csrf_token %}
            <div style="display: flex; gap: 15px;">
                <input type="text" name="group_name" placeholder="Enter Blood Group (e.g. AB+)" class="btn" style="flex: 1; border: 1px solid #ddd; background: #f9f9f9; text-align: left; height: 50px;" required>
                <button type="submit" class="btn btn-primary" style="height: 50px;">ADD GROUP</button>
            </div>
        </form>
    </div>

    <div class="card">
        <h3 style="margin-bottom: 20px;">Registered Blood Groups</h3>
        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;">
            {% for bg in blood_groups %}
            <div style="padding: 12px 20px; background: #f8f9fa; border-radius: 12px; display: flex; justify-content: space-between; align-items: center;">
                <span style="font-weight: 700; color: var(--primary);">{{ bg.name }}</span>
                <a href="{% url 'admin_delete_blood_group' bg.id %}" style="color: #ef233c; text-decoration: none; cursor: pointer; padding: 4px; border-radius: 6px; transition: background 0.2s;" onmouseover="this.style.background='#ffe3e6'" onmouseout="this.style.background='transparent'" onclick="return confirm('Are you sure you want to delete this blood group? This could affect profiles linked to it.');">
                    <i class="fa-solid fa-trash-can"></i>
                </a>
            </div>
            {% empty %}
            <p style="color: #888; grid-column: span 2; text-align: center;">No blood groups added yet.</p>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
