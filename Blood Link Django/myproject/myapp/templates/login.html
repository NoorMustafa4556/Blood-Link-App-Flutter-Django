{% extends 'main.html' %}

{% block content %}
<div style="max-width: 450px; margin: 20px auto; padding: 40px; background: white; border-radius: 30px; box-shadow: var(--shadow); text-align: center; width: 100%;">
    <h1 style="font-size: 36px; margin-bottom: 10px;">Welcome Back</h1>
    <p style="color: #666; margin-bottom: 40px;">Enter your credentials to continue</p>
    
    <form method="POST">
        {% csrf_token %}
        <div style="margin-bottom: 20px;">
            <input type="text" name="username" placeholder="Username" class="btn" style="width: 100%; border: 1px solid #eee; background: #f9f9f9; text-align: left; padding-left: 20px; height: 55px;" required>
        </div>
        <div style="margin-bottom: 30px; position: relative;">
            <input type="password" name="password" id="password" placeholder="Password" class="btn" style="width: 100%; border: 1px solid #eee; background: #f9f9f9; text-align: left; padding-left: 20px; padding-right: 50px; height: 55px;" required>
            <i class="fa-solid fa-eye-slash" id="togglePassword" style="position: absolute; right: 20px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #666; font-size: 18px; z-index: 10;"></i>
        </div>
        
        <div style="margin-bottom: 30px; background: #f8f9fa; padding: 10px; border-radius: 15px;">
            <p style="font-size: 13px; font-weight: 700; margin-bottom: 10px; color: #888;">LOGIN AS</p>
            <div style="display: flex; gap: 10px;">
                <label style="flex: 1; cursor: pointer;">
                    <input type="radio" name="role" value="donor" checked style="display: none;" id="role-donor">
                    <div class="role-btn" onclick="selectRole('donor')" id="btn-donor" style="padding: 10px; border-radius: 10px; background: var(--primary); color: white; font-weight: 700; font-size: 14px;">DONOR</div>
                </label>
                <label style="flex: 1; cursor: pointer;">
                    <input type="radio" name="role" value="recipient" style="display: none;" id="role-recipient">
                    <div class="role-btn" onclick="selectRole('recipient')" id="btn-recipient" style="padding: 10px; border-radius: 10px; background: #eee; color: #666; font-weight: 700; font-size: 14px;">RECIPIENT</div>
                </label>
            </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; height: 55px; justify-content: center; font-size: 18px; border-radius: 15px;">LOGIN</button>
    </form>
    
    <p style="margin-top: 30px; color: #888;">
        Don't have an account? <a href="{% url 'signup' %}" style="color: var(--primary); font-weight: 700; text-decoration: none;">Signup</a>
    </p>
</div>

<script>
    function selectRole(role) {
        document.getElementById('role-' + role).checked = true;
        const btnDonor = document.getElementById('btn-donor');
        const btnRecipient = document.getElementById('btn-recipient');
        
        if(role === 'donor') {
            btnDonor.style.background = 'var(--primary)';
            btnDonor.style.color = 'white';
            btnRecipient.style.background = '#eee';
            btnRecipient.style.color = '#666';
        } else {
            btnRecipient.style.background = 'var(--primary)';
            btnRecipient.style.color = 'white';
            btnDonor.style.background = '#eee';
            btnDonor.style.color = '#666';
        }
    }

    const togglePassword = document.querySelector('#togglePassword');
    const passwordInput = document.querySelector('#password');

    togglePassword.addEventListener('click', function () {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        this.classList.toggle('fa-eye');
        this.classList.toggle('fa-eye-slash');
    });
</script>
{% endblock %}
