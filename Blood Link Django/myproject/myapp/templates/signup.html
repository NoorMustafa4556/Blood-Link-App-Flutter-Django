{% extends 'main.html' %}

{% block content %}
<div style="max-width: 550px; margin: 20px auto; padding: 40px; background: white; border-radius: 30px; box-shadow: var(--shadow); text-align: center; width: 100%;">
    <h1 style="font-size: 36px; margin-bottom: 10px;">Join BloodLink</h1>
    <p style="color: #666; margin-bottom: 40px;">Be a hero, save lives.</p>
    
    <form method="POST" enctype="multipart/form-data" id="signup-form">
        {% csrf_token %}
        
        <!-- Profile Picture Upload Circle -->
        <div style="position: relative; width: 120px; height: 120px; margin: 0 auto 30px auto;">
            <div id="profile-preview-circle" class="preview-circle">
                <img id="profile-preview-img" src="" style="width: 100%; height: 100%; object-fit: cover; display: none;" />
                <i id="profile-placeholder-icon" class="fa-solid fa-user" style="font-size: 50px; color: #ccc;"></i>
            </div>
            <label for="profile-image-input" style="position: absolute; bottom: 0; right: 0; width: 36px; height: 36px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 3px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.15); transition: transform 0.2s;">
                <i class="fa-solid fa-plus" style="color: white; font-size: 16px;"></i>
            </label>
            <input type="file" name="image" id="profile-image-input" accept="image/*" style="display: none;" onchange="previewProfileImage(this)">
        </div>

        <div style="margin-bottom: 25px; background: #f8f9fa; padding: 15px; border-radius: 20px;">
            <p style="font-size: 13px; font-weight: 700; margin-bottom: 10px; color: #888;">SIGNUP AS</p>
            <div style="display: flex; gap: 10px;">
                <label style="flex: 1; cursor: pointer;">
                    <input type="radio" name="role" value="donor" checked style="display: none;" id="role-donor" onchange="toggleDonorFields(true)">
                    <div class="role-btn" id="btn-donor" style="padding: 12px; border-radius: 12px; background: var(--primary); color: white; font-weight: 700;">DONOR</div>
                </label>
                <label style="flex: 1; cursor: pointer;">
                    <input type="radio" name="role" value="recipient" style="display: none;" id="role-recipient" onchange="toggleDonorFields(false)">
                    <div class="role-btn" id="btn-recipient" style="padding: 12px; border-radius: 12px; background: #eee; color: #666; font-weight: 700;">RECIPIENT</div>
                </label>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
            <input type="text" name="full_name" placeholder="Full Name" class="btn" style="border: 1px solid #eee; background: #f9f9f9; text-align: left; padding-left: 15px;" required>
            <input type="text" name="username" placeholder="Username" class="btn" style="border: 1px solid #eee; background: #f9f9f9; text-align: left; padding-left: 15px;" required>
        </div>

        <div style="margin-bottom: 20px;">
            <input type="email" name="email" placeholder="Email Address" class="btn" style="width: 100%; border: 1px solid #eee; background: #f9f9f9; text-align: left; padding-left: 20px;" required>
        </div>

        <div style="margin-bottom: 20px; text-align: left;">
            <input type="tel" id="phone" name="phone_number" class="btn" style="width: 100%; border: 1px solid #eee; background: #f9f9f9; text-align: left;" maxlength="10" required>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
            <select name="blood_group" id="blood_group_div" class="btn" style="border: 1px solid #eee; background: #f9f9f9; text-align: left; padding-left: 15px;">
                <option value="" disabled selected>Blood Group</option>
                {% for bg in blood_groups %}
                <option value="{{ bg }}">{{ bg }}</option>
                {% endfor %}
            </select>
            <select name="city" class="btn" style="border: 1px solid #eee; background: #f9f9f9; text-align: left; padding-left: 15px;" required>
                <option value="" disabled selected>Select City</option>
                {% for city in cities %}
                <option value="{{ city.name }}">{{ city.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div style="margin-bottom: 30px; position: relative;">
            <input type="password" name="password" id="password" placeholder="Password" class="btn" style="width: 100%; border: 1px solid #eee; background: #f9f9f9; text-align: left; padding-left: 20px; padding-right: 50px;" required>
            <i class="fa-solid fa-eye-slash" id="togglePassword" style="position: absolute; right: 20px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #666; font-size: 18px; z-index: 10;"></i>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; height: 55px; justify-content: center; font-size: 18px; border-radius: 15px;">CREATE ACCOUNT</button>
    </form>
</div>

<script>
    const phoneInput = document.querySelector("#phone");
    const iti = window.intlTelInput(phoneInput, {
        initialCountry: "pk",
        separateDialCode: true,
        utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js",
    });

    // Restrict input to digits only
    phoneInput.addEventListener('input', function() {
        this.value = this.value.replace(/[^0-9]/g, '');
    });

    function toggleDonorFields(isDonor) {
        const bloodDiv = document.getElementById('blood_group_div');
        const btnDonor = document.getElementById('btn-donor');
        const btnRecipient = document.getElementById('btn-recipient');
        
        if(isDonor) {
            bloodDiv.style.display = 'block';
            bloodDiv.required = true;
            btnDonor.style.background = 'var(--primary)';
            btnDonor.style.color = 'white';
            btnRecipient.style.background = '#eee';
            btnRecipient.style.color = '#666';
        } else {
            bloodDiv.style.display = 'none';
            bloodDiv.required = false;
            btnRecipient.style.background = 'var(--primary)';
            btnRecipient.style.color = 'white';
            btnDonor.style.background = '#eee';
            btnDonor.style.color = '#666';
        }
    }

    document.getElementById('signup-form').onsubmit = function(e) {
        const cleanNumber = phoneInput.value.replace(/[^0-9]/g, '');
        const isFallbackValid = /^[0-9]{9,12}$/.test(cleanNumber);
        
        let isLibraryValid = false;
        try {
            isLibraryValid = iti.isValidNumber();
        } catch (err) {
            isLibraryValid = false;
        }

        if (!isLibraryValid && !isFallbackValid) {
            alert("Please enter a valid phone number.");
            e.preventDefault();
            return false;
        }
        
        let fullNumber = iti.getNumber();
        if (!fullNumber) {
            const countryData = iti.getSelectedCountryData();
            const dialCode = countryData.dialCode ? '+' + countryData.dialCode : '+92';
            fullNumber = dialCode + cleanNumber;
        }
        phoneInput.value = fullNumber;
    };

    const togglePassword = document.querySelector('#togglePassword');
    const passwordInput = document.querySelector('#password');

    togglePassword.addEventListener('click', function () {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        this.classList.toggle('fa-eye');
        this.classList.toggle('fa-eye-slash');
    });

    function previewProfileImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('profile-preview-img').src = e.target.result;
                document.getElementById('profile-preview-img').style.display = 'block';
                document.getElementById('profile-placeholder-icon').style.display = 'none';
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    document.getElementById('profile-preview-circle').onclick = function() {
        document.getElementById('profile-image-input').click();
    };
</script>

<style>
    .iti { width: 100%; }
    .preview-circle {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        border: 3px solid #eee;
        overflow: hidden;
        background: #f8f9fa;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        transition: all 0.2s ease-in-out;
    }
    .preview-circle:hover {
        border-color: var(--primary);
        transform: scale(1.03);
    }
</style>
{% endblock %}
