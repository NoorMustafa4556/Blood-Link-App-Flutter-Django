{% extends 'main.html' %}

{% block extra_css %}
<style>
    .request-card { max-width: 700px; margin: 0 auto; background: white; border-radius: 30px; overflow: hidden; box-shadow: var(--shadow); }
    .request-header { background: var(--primary); padding: 40px; text-align: center; color: white; }
    .request-body { padding: 40px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #666; font-size: 14px; }
    .form-control { width: 100%; padding: 12px 18px; border-radius: 12px; border: 1px solid #eee; background: #f9f9f9; font-size: 15px; }
    .form-control:focus { border-color: var(--primary); background: white; outline: none; }
</style>
{% endblock %}

{% block content %}
<div class="header">
    <h1>Send Blood Request</h1>
</div>

<div class="request-card">
    <div class="request-header">
        <i class="fa-solid fa-paper-plane" style="font-size: 50px; margin-bottom: 15px; opacity: 0.8;"></i>
        <h2>Request to {{ donor.first_name }}</h2>
        <p style="opacity: 0.9;">Donor Blood Group: <span style="font-weight: 800;">{{ donor.profile.blood_group }}</span></p>
    </div>

    <div class="request-body">
        <form method="POST">
            {% csrf_token %}
            <div class="form-grid">
                <div class="form-group">
                    <label>Patient Name</label>
                    <input type="text" name="patient_name" placeholder="Enter Patient Name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Required Blood Group</label>
                    <select name="blood_group" class="form-control" required>
                        <option value="" disabled>Select Blood Group</option>
                        {% for bg in blood_groups %}
                        <option value="{{ bg }}" {% if donor.profile.blood_group == bg %}selected{% endif %}>{{ bg }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Hospital Name</label>
                    <input type="text" name="hospital_name" placeholder="e.g. Mayo Hospital" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>City</label>
                    <select name="city" class="form-control" required>
                        <option value="" disabled>Select City</option>
                        {% for c in cities %}
                        <option value="{{ c.name }}" {% if donor.profile.city == c.name %}selected{% endif %}>{{ c.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group" style="grid-column: span 2;">
                    <label>Need Blood Within (Duration)</label>
                    <select name="duration" class="form-control" required>
                        <option value="1">1 Hour</option>
                        <option value="2">2 Hours</option>
                        <option value="4">4 Hours</option>
                        <option value="8">8 Hours</option>
                        <option value="24">24 Hours</option>
                    </select>
                </div>
                <div class="form-group" style="grid-column: span 2;">
                    <label>Additional Message</label>
                    <textarea name="message" rows="4" placeholder="Any specific requirements or emergency notes..." class="form-control" required></textarea>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; height: 55px; justify-content: center; font-size: 18px; margin-top: 20px;">SEND REQUEST</button>
        </form>
    </div>
</div>
{% endblock %}
